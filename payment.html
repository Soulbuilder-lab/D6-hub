<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | FoodCourt Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo"><i class="fas fa-utensils"></i> FoodCourt Hub</a>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="notification.html" class="nav-link">Alerts</a>
      <a href="payment-history.html" class="nav-link">History</a>
    </nav>
  </header>

  <main class="payment-container">
    <h2 style="margin-bottom:20px;">Your Selection</h2>
    <div class="glass-card" id="orderItems"></div>
    <div class="cart-summary">
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="summary-row"><span>Service Fee</span><span>$2.50</span></div>
      <div class="summary-row"><span>Estimated Tax</span><span id="tax">$0.00</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>
    </div>

    <div class="glass-card" style="margin-top:20px;">
      <h3 style="margin-bottom:10px;">Payment Method</h3>
      <p style="color:#8c8c8c; margin-bottom:15px;">Cash at Counter. Pay when you pick up your order.</p>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="color:#8c8c8c;">Table:</span>
        <span id="payTable" style="font-weight:700; color:var(--primary);">--</span>
      </div>
      <button class="complete-btn" id="completeBtn">COMPLETE ORDER</button>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-bottom">© 2024 FoodCourt Hub. All rights reserved.</div>
  </footer>

  <script src="js/payment.js"></script>
</body>
</html>
