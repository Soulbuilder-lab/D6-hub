<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | FoodCourt Hub</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

  <div class="login-box">
    <h2><i class="fas fa-utensils" style="margin-right:8px;"></i>Admin Login</h2>
    <input type="text" id="username" placeholder="Username (e.g., food)" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <div id="error" class="error">Wrong Username or Password</div>
    <button onclick="login()">Login</button>
  </div>

  <script src="admin-login.js"></script>
</body>
</html>
